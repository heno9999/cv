
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shahm CV Analyzer - محلل السير الذاتية الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        overflow-x: hidden;
      }
      
      /* الخلفية الإبداعية الجديدة - نسخة احترافية هادئة */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #f8fafc;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.4;
        z-index: -2;
      }

      /* تأثير ضوء علوي خفيف جداً */
      body::after {
        content: "";
        position: fixed;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 80vw; height: 50vh;
        background: radial-gradient(ellipse at top, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
        z-index: -1;
        pointer-events: none;
      }

      .ai-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); transition: all 0.2s ease; }
      .ai-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02); }
      
      .ai-header-border { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
      
      .ai-voice-orb { width: 36px; height: 36px; border-radius: 0.75rem; background: linear-gradient(135deg, #2563eb, #4f46e5); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39); }
      .ai-voice-orb::after { content: ""; width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.8); }
      
      .ai-btn-phosphor { background: #1e293b; color: white; transition: all 0.2s ease; border-radius: 0.5rem; }
      .ai-btn-phosphor:hover { background: #0f172a; transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
      
      .ai-text-shimmer { color: #0f172a; font-weight: 800; letter-spacing: -0.025em; }
      
      .ai-glow-wrapper { position: relative; padding: 1px; background: #e2e8f0; border-radius: 1.5rem; transition: all 0.3s ease; }
      .ai-glow-wrapper:hover { background: #cbd5e1; }
      
      .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      @keyframes slideUpImage { from { opacity: 0; transform: translateY(100px); } to { opacity: 1; transform: translateY(0); } }
      
      .scanner-laser { background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.8), transparent); height: 2px; box-shadow: 0 0 8px rgba(59, 130, 246, 0.4); animation: scan 2.5s ease-in-out infinite; }
      @keyframes scan { 0%, 100% { transform: translateY(0); opacity: 0; } 50% { transform: translateY(300px); opacity: 1; } }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
