
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shahm CV Analyzer - محلل السير الذاتية الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        overflow-x: hidden;
      }
      
      /* الخلفية الإبداعية الجديدة */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: 
          /* نمط الشبكة التقنية */
          linear-gradient(rgba(226, 232, 240, 0.3) 1px, transparent 1px),
          linear-gradient(90deg, rgba(226, 232, 240, 0.3) 1px, transparent 1px),
          /* تدرجات لونية هادئة ومتحركة */
          radial-gradient(circle at 0% 0%, rgba(66, 133, 244, 0.08) 0%, transparent 40%),
          radial-gradient(circle at 100% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(155, 114, 203, 0.05) 0%, transparent 50%);
        background-size: 40px 40px, 40px 40px, 100% 100%, 100% 100%, 100% 100%;
        z-index: -2;
      }

      /* تأثير الضوء العائم في الخلفية */
      body::after {
        content: "";
        position: fixed;
        top: -10%; left: -10%; width: 40%; height: 40%;
        background: radial-gradient(circle, rgba(66, 133, 244, 0.1) 0%, transparent 70%);
        filter: blur(80px);
        z-index: -1;
        animation: float-glow 15s ease-in-out infinite alternate;
      }

      @keyframes float-glow {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40vw, 30vh) scale(1.5); }
      }

      .ai-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
      
      @keyframes aiBorderRotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
      .ai-header-border { position: relative; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
      .ai-header-border::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #4285F4, #9B72CB, #D96570, #F4AF40, #4285F4); background-size: 300% 300%; animation: aiBorderRotate 3s linear infinite; box-shadow: 0 2px 10px rgba(66, 133, 244, 0.2); }
      
      .ai-voice-orb { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #4285F4, #9B72CB, #D96570, #F4AF40); background-size: 200% 200%; animation: orb-shimmer 4s ease infinite; box-shadow: 0 0 20px rgba(66, 133, 244, 0.3); }
      @keyframes orb-shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
      
      .ai-btn-phosphor { background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #f4af40, #4285f4); background-size: 300% 300%; animation: aiBorderRotate 3s linear infinite; color: white; transition: all 0.3s ease; }
      .ai-text-shimmer { background: linear-gradient(to right, #4285f4 0%, #9b72cb 25%, #d96570 50%, #f4af40 75%, #4285f4 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmerText 3s linear infinite; font-weight: 900; }
      @keyframes shimmerText { to { background-position: 200% center; } }
      
      .ai-glow-wrapper { position: relative; padding: 2px; background: linear-gradient(90deg, #4285F4, #9B72CB, #D96570, #F4AF40, #4285F4); background-size: 300% 300%; animation: aiBorderRotate 4s linear infinite; border-radius: 1.5rem; }
      
      .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      
      .scanner-laser { background: linear-gradient(to bottom, transparent, #3b82f6, transparent); height: 2px; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); animation: scan 3s ease-in-out infinite; }
      @keyframes scan { 0%, 100% { transform: translateY(0); opacity: 0.1; } 50% { transform: translateY(300px); opacity: 0.4; } }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.0"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
